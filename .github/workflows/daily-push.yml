name: Daily WeChat digest push

on:
  # Chain directly off the data refresh so the digest always uses fresh data
  # and is not subject to a second round of GitHub cron queueing.
  workflow_run:
    workflows: ["Refresh intelligence data"]
    types: [completed]
  schedule:
    # Fallback at 12:23 Asia/Shanghai in case the morning refresh was dropped
    # entirely; the gate below skips it when today's digest already exists.
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: agent-pulse-daily-push
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      go: ${{ steps.decide.outputs.go }}
    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Decide whether to publish today's digest
        id: decide
        shell: bash
        run: |
          set -euo pipefail
          today="$(TZ=Asia/Shanghai date +%F)"
          hour="$(TZ=Asia/Shanghai date +%-H)"
          event="${{ github.event_name }}"
          conclusion="${{ github.event.workflow_run.conclusion || 'n/a' }}"
          go=false
          if [[ "$event" == "workflow_dispatch" ]]; then
            go=true
          elif [[ -f "digests/$today.md" ]]; then
            echo "Digest for $today already exists; skipping."
          elif [[ "$event" == "workflow_run" && "$conclusion" == "success" && "$hour" -ge 5 && "$hour" -lt 17 ]]; then
            go=true
          elif [[ "$event" == "schedule" ]]; then
            go=true
          fi
          echo "event=$event conclusion=$conclusion hour=$hour go=$go"
          echo "go=$go" >> "$GITHUB_OUTPUT"

  push-digest:
    needs: gate
    if: needs.gate.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PUBLIC_SITE_URL: https://jw-90124.github.io/AI-News/
      GITHUB_REPOSITORY_URL: https://github.com/JW-90124/AI-News
    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Restore repository snapshot
        run: npm run db:snapshot -- restore

      - name: Export public content
        run: npm run export -- --skip-seed

      - name: Build digest and push to WeCom
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          WECOM_CORP_ID: ${{ secrets.WECOM_CORP_ID }}
          WECOM_APP_SECRET: ${{ secrets.WECOM_APP_SECRET }}
          WECOM_AGENT_ID: ${{ secrets.WECOM_AGENT_ID }}
        run: node scripts/daily-push.mjs

      - name: Commit digest drafts
        shell: bash
        run: |
          set -euo pipefail
          git add digests
          if git diff --cached --quiet; then
            echo "No digest changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(digest): daily WeChat digest draft"
          git pull --rebase origin main
          git push origin HEAD:main
